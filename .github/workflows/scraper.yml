name: Telegram to GDrive Archiver

# This allows you to trigger the script manually from the Actions tab
on:
  workflow_dispatch:

jobs:
  scrape_and_upload:
    runs-on: ubuntu-latest
    
    # Pass our hidden secrets into the server environment
    env:
      API_ID: ${{ secrets.API_ID }}
      API_HASH: ${{ secrets.API_HASH }}
      TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION }}
      RCLONE_CONF_JSON: ${{ secrets.RCLONE_CONF }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: |
          pip install telethon cryptg

      - name: Install Rclone and FUSE
        run: |
          sudo apt-get update
          sudo apt-get install -y rclone fuse3

      - name: Configure Rclone Connection
        run: |
          mkdir -p ~/.config/rclone
          cat << EOF > ~/.config/rclone/rclone.conf
          [gdrive]
          type = drive
          scope = drive
          token = $RCLONE_CONF_JSON
          EOF

      - name: Mount Google Drive
        run: |
          # Replicate the Colab folder structure
          sudo mkdir -p /content/drive/MyDrive
          sudo chown -R $USER:$USER /content
          
          # Mount the drive in the background via daemon
          rclone mount gdrive: /content/drive/MyDrive --daemon --vfs-cache-mode writes
          
          # Give it a few seconds to establish the connection
          sleep 5 

      - name: Run Telegram Scraper
        run: |
          python main.py
          
